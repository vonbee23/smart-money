services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: smart_money
      CORS_ORIGINS: http://localhost:5173,http://localhost:4173
      SEC_USER_AGENT: SmartMoneyApp contact@example.com
      REFRESH_INTERVAL_MINUTES: 15
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4173:4173"

volumes:
  mongo_data:
